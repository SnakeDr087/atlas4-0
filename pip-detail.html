<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATLAS — PIP Detail</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div class="main-content">
    <header id="topbar" class="topbar"></header>
    <main class="page-content">

      <div id="loading-state" style="display:flex;align-items:center;justify-content:center;height:300px;">
        <div class="spinner spinner-lg"></div>
      </div>
      <div id="not-found" style="display:none;" class="empty-state">
        <div class="empty-title">PIP not found</div>
        <div class="empty-text">This PIP may have been removed or you may not have access.</div>
        <a href="pips.html" class="btn btn-secondary" style="margin-top:16px;">← Back to PIPs</a>
      </div>

      <div id="page-content" style="display:none;" class="animate-fade-in">

        <div class="flex items-center justify-between" style="margin-bottom:24px;gap:12px;flex-wrap:wrap;">
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
              <a href="pips.html" style="font-size:13px;color:var(--text-muted);">PIPs</a>
              <span style="color:var(--text-muted);">/</span>
              <span id="pip-num" class="mono" style="font-size:13px;color:var(--accent);"></span>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <h1 id="officer-name" style="font-size:22px;"></h1>
              <span id="status-badge"></span>
            </div>
          </div>
          <a href="pips.html" class="btn btn-ghost">← PIPs</a>
        </div>

        <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;">

          <!-- Main content -->
          <div>

            <!-- Case info -->
            <div class="card" style="margin-bottom:20px;">
              <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
                   color:var(--text-muted);margin-bottom:12px;padding-bottom:8px;
                   border-bottom:1px solid var(--border-subtle);">PIP Details</div>
              <div style="display:grid;grid-template-columns:160px 1fr;gap:8px 12px;">
                <div style="font-size:12px;color:var(--text-muted);">Case Number</div>
                <div id="d-case-num" class="mono" style="font-size:13px;color:var(--accent);"></div>
                <div style="font-size:12px;color:var(--text-muted);">Officer</div>
                <div id="d-officer" style="font-size:13px;color:var(--text-primary);"></div>
                <div style="font-size:12px;color:var(--text-muted);">Created By</div>
                <div id="d-supervisor" style="font-size:13px;color:var(--text-secondary);"></div>
                <div style="font-size:12px;color:var(--text-muted);">Start Date</div>
                <div id="d-start" style="font-size:13px;color:var(--text-secondary);"></div>
                <div style="font-size:12px;color:var(--text-muted);">End Date</div>
                <div id="d-end" style="font-size:13px;color:var(--text-secondary);"></div>
                <div style="font-size:12px;color:var(--text-muted);">Source Review</div>
                <div id="d-review-link" style="font-size:13px;"></div>
              </div>
            </div>

            <!-- Goals -->
            <div class="card" style="margin-bottom:20px;">
              <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
                   color:var(--text-muted);margin-bottom:12px;padding-bottom:8px;
                   border-bottom:1px solid var(--border-subtle);">Goals</div>
              <div id="d-goals" style="font-size:13px;color:var(--text-secondary);white-space:pre-wrap;min-height:40px;"></div>
              <div id="goals-edit" style="display:none;margin-top:12px;">
                <textarea id="goals-input" rows="5" placeholder="Define the performance goals for this PIP…"></textarea>
                <button class="btn btn-primary btn-sm" id="save-goals-btn" style="margin-top:8px;">Save Goals</button>
              </div>
            </div>

            <!-- Outcome notes -->
            <div class="card" id="outcome-notes-card">
              <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
                   color:var(--text-muted);margin-bottom:12px;padding-bottom:8px;
                   border-bottom:1px solid var(--border-subtle);">Outcome Notes</div>
              <div id="d-outcome-notes" style="font-size:13px;color:var(--text-secondary);white-space:pre-wrap;min-height:40px;"></div>
              <div id="outcome-notes-edit" style="display:none;margin-top:12px;">
                <textarea id="outcome-notes-input" rows="4" placeholder="Document the outcome of this PIP…"></textarea>
                <button class="btn btn-primary btn-sm" id="save-outcome-notes-btn" style="margin-top:8px;">Save</button>
              </div>
            </div>

          </div>

          <!-- Sidebar -->
          <div style="display:flex;flex-direction:column;gap:16px;position:sticky;top:calc(var(--topbar-height)+20px);">

            <!-- Status management -->
            <div class="card" id="status-panel" style="display:none;">
              <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
                   color:var(--text-muted);margin-bottom:12px;">Update Status</div>
              <select id="status-select" style="margin-bottom:10px;">
                <option value="active">Active</option>
                <option value="completed">Completed</option>
                <option value="failed">Failed</option>
                <option value="withdrawn">Withdrawn</option>
              </select>
              <div class="form-group">
                <input type="date" id="end-date-input" placeholder="End date">
              </div>
              <button class="btn btn-primary btn-sm w-full" id="update-status-btn">Update Status</button>
            </div>

            <!-- Access list -->
            <div class="card" id="access-panel" style="display:none;">
              <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
                   color:var(--text-muted);margin-bottom:12px;">Case Access</div>
              <div id="access-list" style="margin-bottom:12px;"></div>
              <div style="display:flex;gap:8px;">
                <select id="grant-user-select" style="flex:1;">
                  <option value="">Add user…</option>
                </select>
                <button class="btn btn-secondary btn-sm" id="grant-access-btn">Add</button>
              </div>
            </div>

          </div>
        </div>
      </div>

    </main>
  </div>
</div>
<div id="toast-container"></div>
<script src="config.js"></script>
<script type="module">
  import { initAuth } from './auth.js';
  import { renderNav, renderTopbar } from './nav.js';
  import { supabase } from './supabase-client.js';

  const { profile } = await initAuth({ requireAuth: true });
  renderNav(profile, 'pips');
  renderTopbar('PIP Detail');

  const params = new URLSearchParams(window.location.search);
  const pipId  = params.get('id');
  if (!pipId) { location.href = 'pips.html'; }

  const { data: pip, error } = await supabase
    .from('pips')
    .select(`
      *,
      officer:personnel_roster(first_name, last_name, badge_number),
      supervisor:profiles!creating_supervisor_id(full_name)
    `)
    .eq('id', pipId)
    .single();

  document.getElementById('loading-state').style.display = 'none';

  if (error || !pip) {
    document.getElementById('not-found').style.display = 'block';
    throw new Error('Not found');
  }

  document.getElementById('page-content').style.display = 'block';

  const officerName = pip.officer
    ? `${pip.officer.last_name}, ${pip.officer.first_name}` : 'Unknown';

  document.getElementById('pip-num').textContent     = pip.case_number || '—';
  document.getElementById('officer-name').textContent = officerName;
  document.getElementById('status-badge').innerHTML   = pipBadge(pip.status);
  document.getElementById('d-case-num').textContent   = pip.case_number || '—';
  document.getElementById('d-officer').textContent    = officerName + (pip.officer?.badge_number ? ` (#${pip.officer.badge_number})` : '');
  document.getElementById('d-supervisor').textContent = pip.supervisor?.full_name || '—';
  document.getElementById('d-start').textContent      = fmtDate(pip.start_date);
  document.getElementById('d-end').textContent        = fmtDate(pip.end_date);
  document.getElementById('d-review-link').innerHTML  = pip.source_review_id
    ? `<a href="review-detail.html?id=${pip.source_review_id}" style="color:var(--accent);">View Source Review →</a>`
    : '—';

  const goalsEl         = document.getElementById('d-goals');
  const outcomeNotesEl  = document.getElementById('d-outcome-notes');
  const goalsInput      = document.getElementById('goals-input');
  const outcomeInput    = document.getElementById('outcome-notes-input');

  goalsEl.textContent        = pip.goals || 'No goals recorded.';
  outcomeNotesEl.textContent = pip.outcome_notes || 'No outcome notes recorded.';
  goalsInput.value           = pip.goals || '';
  outcomeInput.value         = pip.outcome_notes || '';

  // Can manage if creating supervisor, or leadership
  const canManage = pip.creating_supervisor_id === profile.id ||
    ['super_admin','chief','internal_affairs'].includes(profile.role);

  if (canManage) {
    document.getElementById('status-panel').style.display = 'block';
    document.getElementById('access-panel').style.display = 'block';
    document.getElementById('goals-edit').style.display = 'block';
    document.getElementById('outcome-notes-edit').style.display = 'block';
    document.getElementById('status-select').value = pip.status;
    if (pip.end_date) document.getElementById('end-date-input').value = pip.end_date;
  }

  document.getElementById('update-status-btn')?.addEventListener('click', async () => {
    const newStatus = document.getElementById('status-select').value;
    const endDate   = document.getElementById('end-date-input').value || null;
    const { error } = await supabase.from('pips')
      .update({ status: newStatus, end_date: endDate, updated_at: new Date().toISOString() })
      .eq('id', pipId);
    if (error) { showToast('error', 'Failed', error.message); return; }
    document.getElementById('status-badge').innerHTML = pipBadge(newStatus);
    showToast('success', 'Status updated');
  });

  document.getElementById('save-goals-btn')?.addEventListener('click', async () => {
    const goals = goalsInput.value.trim();
    const { error } = await supabase.from('pips')
      .update({ goals, updated_at: new Date().toISOString() })
      .eq('id', pipId);
    if (error) { showToast('error', 'Failed', error.message); return; }
    goalsEl.textContent = goals || 'No goals recorded.';
    showToast('success', 'Goals saved');
  });

  document.getElementById('save-outcome-notes-btn')?.addEventListener('click', async () => {
    const notes = outcomeInput.value.trim();
    const { error } = await supabase.from('pips')
      .update({ outcome_notes: notes, updated_at: new Date().toISOString() })
      .eq('id', pipId);
    if (error) { showToast('error', 'Failed', error.message); return; }
    outcomeNotesEl.textContent = notes || 'No outcome notes recorded.';
    showToast('success', 'Saved');
  });

  // Access list
  async function loadAccessList() {
    const { data: access } = await supabase
      .from('pip_access_list')
      .select('id, profile_id, granted_at, profile:profiles(full_name, role)')
      .eq('pip_id', pipId)
      .is('revoked_at', null);

    const list = document.getElementById('access-list');
    if (!access?.length) {
      list.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">No named individuals added.</div>';
      return;
    }

    list.innerHTML = access.map(a => `
      <div style="display:flex;align-items:center;justify-content:space-between;
           padding:6px 0;border-bottom:1px solid var(--border-subtle);">
        <div>
          <div style="font-size:13px;color:var(--text-primary);">${escHtml(a.profile?.full_name||'Unknown')}</div>
          <div style="font-size:11px;color:var(--text-muted);">${a.profile?.role||''}</div>
        </div>
        ${canManage ? `<button class="btn btn-ghost btn-sm" onclick="revokeAccess('${a.id}')">Revoke</button>` : ''}
      </div>
    `).join('');
  }

  window.revokeAccess = async function(accessId) {
    await supabase.from('pip_access_list')
      .update({ revoked_at: new Date().toISOString() }).eq('id', accessId);
    await loadAccessList();
    showToast('success', 'Access revoked');
  };

  if (canManage) {
    const { data: users } = await supabase
      .from('profiles').select('id, full_name, role')
      .eq('agency_id', profile.agency_id).eq('is_active', true).order('full_name');

    const sel = document.getElementById('grant-user-select');
    (users || []).forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = `${u.full_name} (${u.role.replace('_',' ')})`;
      sel.appendChild(opt);
    });

    document.getElementById('grant-access-btn').addEventListener('click', async () => {
      const userId = sel.value;
      if (!userId) return;
      const { error } = await supabase.from('pip_access_list').upsert({
        pip_id: pipId, profile_id: userId, granted_by: profile.id
      }, { onConflict: 'pip_id,profile_id', ignoreDuplicates: false });
      if (error) { showToast('error', 'Failed', error.message); return; }
      sel.value = '';
      await loadAccessList();
      showToast('success', 'Access granted');
    });
  }

  await loadAccessList();

  function fmtDate(str) {
    if (!str) return '—';
    return new Date(str + 'T00:00:00').toLocaleDateString('en-US',
      { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function pipBadge(s) {
    const m = { active:'badge-warning', completed:'badge-success',
                failed:'badge-danger', withdrawn:'badge-muted' };
    const l = s ? s.replace(/\b\w/g,c=>c.toUpperCase()) : '—';
    return `<span class="badge ${m[s]||'badge-muted'}">${l}</span>`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast(type, title, body='') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.innerHTML = `<div class="toast-content"><div class="toast-title">${title}</div>${body?`<div class="toast-body">${body}</div>`:''}</div>`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }
</script>
</body>
</html>
